<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planejamento de Metas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>OrganiZ</h1>
    <div class="perfil-icon">👤</div>
  </header>

  <main>
    <h2>Planejamento de Metas</h2>

    <!-- Botões de navegação e adicionar metas -->
    <div class="botoes-metas">
      <button id="voltar" class="botao-roxo">Voltar</button>
      <button id="adicionar" class="botao-roxo">Adicionar Meta</button>
    </div>

    <section id="listaMetas" class="area-metas">
      <!-- Metas aparecem aqui -->
    </section>

    <!-- Formulário -->
    <div id="formulario" class="formulario">
      <h3 id="tituloFormulario">Nova Meta</h3>
      <input type="text" id="categoria" placeholder="Categoria (Pessoal, Profissional...)">
      <input type="text" id="descricao" placeholder="Descrição da Meta">
      
      <select id="icone">
        <option value="🎯">🎯 Meta</option>
        <option value="📘">📘 Estudo</option>
        <option value="💼">💼 Trabalho</option>
        <option value="🏃">🏃 Saúde</option>
        <option value="🧘‍♀️">🧘‍♀️ Bem-estar</option>
        <option value="💰">💰 Finanças</option>
        <option value="🎨">🎨 Criatividade</option>
      </select>

      <!-- Botão para salvar a meta -->
      <button onclick="salvarMeta()" class="botao-roxo botao-salvar">Salvar</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
